version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: karyavaani-postgres
    ports:
      - "3242:5432"
    environment:
      - POSTGRES_DB=karyavaani
      - POSTGRES_USER=karyavaani
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-karyavaani-dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karyavaani -d karyavaani"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/pionedata/karyavaani-backend:latest
    container_name: karyavaani-backend
    ports:
      - "3241:3241"
    environment:
      - PORT=3241
      - DATABASE_URL=postgresql://karyavaani:${POSTGRES_PASSWORD:-karyavaani-dev}@postgres:5432/karyavaani
      - MAIL_HOST=smtp.office365.com
      - EMAIL_PORT=587
      - EMAIL_HOST_USER=support@pionedata.com
      # Supplied via the runtime .env (GitHub secret) — not hard-coded.
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      # WhatsApp gateway (standalone comms server, shared across apps)
      - COMMS_BASE_URL=http://comms-server:4100
      - COMMS_API_KEY=${COMMS_API_KEY:-change-me-shared-secret}
    depends_on:
      postgres:
        condition: service_healthy
      comms-server:
        condition: service_started
    restart: unless-stopped

  # Standalone, reusable communication server (WhatsApp via Meta Cloud API).
  # Holds the provider credentials so any app can send/receive through it.
  # With no Meta creds it runs in mock mode (messages logged, not sent).
  comms-server:
    build:
      context: ./comms-server
      dockerfile: Dockerfile
    image: ghcr.io/pionedata/karyavaani-comms:latest
    container_name: karyavaani-comms
    ports:
      - "4100:4100"
    environment:
      - PORT=4100
      - WHATSAPP_PROVIDER=meta
      - COMMS_API_KEY=${COMMS_API_KEY:-change-me-shared-secret}
      - META_API_VERSION=${META_API_VERSION:-v21.0}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-karya-vaani-verify}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - COMMS_VERIFY_SIGNATURE=${COMMS_VERIFY_SIGNATURE:-false}
      # TEST ONLY: redirect every outbound message to this one number.
      # Remove (set empty) to send to real recipients in production.
      - WHATSAPP_TEST_RECIPIENT=${WHATSAPP_TEST_RECIPIENT:-919500200300}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/pionedata/karyavaani-ui:latest
    container_name: karyavaani-frontend
    ports:
      - "3240:3240"
    depends_on:
      - backend
      - comms-server
    restart: unless-stopped

volumes:
  postgres_data:
