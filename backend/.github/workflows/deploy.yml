name: Karyavaani CI/CD

on:
push:
branches:
- main
workflow_dispatch:

env:
REGISTRY: ghcr.io
FRONTEND_IMAGE: karyavaani-frontend
BACKEND_IMAGE: karyavaani-backend

jobs:
docker-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Login to GHCR
    run: |
      echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

  - name: Set Image Names
    run: |
      USERNAME=$(echo "${{ secrets.GHCR_USERNAME }}" | tr '[:upper:]' '[:lower:]')
      echo "USERNAME=$USERNAME" >> $GITHUB_ENV

  - name: Build Backend Image
    run: |
      docker build \
        -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest \
        -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
        ./backend

  - name: Build Frontend Image
    run: |
      docker build \
        -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest \
        -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
        .

  - name: Push Backend Image
    run: |
      docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
      docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  - name: Push Frontend Image
    run: |
      docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
      docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
```

deploy:
runs-on: ubuntu-latest
needs: docker-build

```
steps:
  - name: Deploy to Server
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_IP }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        set -e

        echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

        cd /home/${{ secrets.SERVER_USER }}/karyavaani

        docker compose pull

        docker compose up -d

        docker image prune -af

        echo "Deployment completed"
```
