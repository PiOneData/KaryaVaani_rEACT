name: Karyavaani CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: karyavaani-frontend
  BACKEND_IMAGE: karyavaani-backend

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔤 Set lowercase username
        run: |
          USERNAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV

      - name: 🏗️ Build Backend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ./backend

      - name: 🏗️ Build Frontend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            .

      - name: 📤 Push Backend Image
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: 📤 Push Frontend Image
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production

    steps:
      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          command_timeout: 25m

          script: |
            set -e

            echo "🔑 Logging into GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" \
              --password-stdin

            echo "📂 Moving to application directory..."
            cd /home/${{ secrets.SERVER_USER }}/KaryaVaani_rEACT

            echo "📦 Pulling latest images..."
            docker compose pull

            echo "🚀 Restarting services..."
            docker compose up -d

            echo "✅ Deployment completed successfully!"
