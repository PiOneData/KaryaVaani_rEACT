name: Karyavaani CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: karyavaani-ui
  BACKEND_IMAGE: karyavaani-backend
  COMMS_IMAGE: karyavaani-comms

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: |
          USERNAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV

      - name: Build Backend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            .

      - name: Build Comms Server Image
        run: |
          docker build \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.COMMS_IMAGE }}:latest \
            -t ghcr.io/${{ env.USERNAME }}/${{ env.COMMS_IMAGE }}:${{ github.sha }} \
            ./comms-server

      - name: Push Backend Image
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Push Comms Server Image
        run: |
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.COMMS_IMAGE }}:latest
          docker push ghcr.io/${{ env.USERNAME }}/${{ env.COMMS_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Debug Secrets
        run: |
          echo "SERVER_IP configured"
          echo "SERVER_USER configured"
          echo "SSH_PRIVATE_KEY configured"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            cd /home/${{ secrets.SERVER_USER }}/KaryaVaani_rEACT

            # Force the server checkout to exactly match the pushed commit.
            # A deploy box should mirror the repo, not accumulate hand-edits;
            # `git pull` aborts when tracked files have drifted locally, which
            # silently breaks deploys. reset --hard is idempotent and leaves
            # untracked/ignored runtime files (.env, backend/data/*) intact.
            git fetch origin main
            git reset --hard origin/main

            # Write the runtime .env that docker compose reads for variable
            # substitution. Values come from GitHub repository secrets.
            cat > .env <<'ENVEOF'
            COMMS_API_KEY=${{ secrets.COMMS_API_KEY }}
            # AOC portal ("BOT API") WhatsApp gateway (active provider)
            WHATSAPP_PROVIDER=aoc
            AOC_BASE_URL=https://apis.aoc-portal.com
            AOC_API_KEY=${{ secrets.AOC_API_KEY }}
            AOC_FROM_ID=918220099940
            AOC_WEBHOOK_TOKEN_HEADER=x-webhook-token
            AOC_WEBHOOK_TOKEN=${{ secrets.AOC_WEBHOOK_TOKEN }}
            # Legacy Meta Cloud API provider (only used when WHATSAPP_PROVIDER=meta)
            META_API_VERSION=v21.0
            META_PHONE_NUMBER_ID=${{ secrets.META_PHONE_NUMBER_ID }}
            META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
            META_VERIFY_TOKEN=${{ secrets.META_VERIFY_TOKEN }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            COMMS_VERIFY_SIGNATURE=false
            WHATSAPP_TEST_RECIPIENT=919500200300
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            ENVEOF

            # Build images from the freshly pulled source instead of pulling
            # the registry tag. This guarantees the running containers reflect
            # the latest committed code, even if the CI build/push step lagged
            # or the :latest tag is stale. --pull refreshes the base images.
            docker compose build --pull
            docker compose up -d --force-recreate

            echo "Deployment completed"
