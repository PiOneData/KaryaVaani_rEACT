server {
    listen 3240;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # WhatsApp webhook -> comms server. The AOC portal ("BOT API") POSTs
    # every subscribed event (inbound messages, delivery reports, metrics)
    # to this ONE public URL: https://<host>/api/whatsapp/webhook
    # More specific than /api/, so it wins over the backend proxy below.
    location = /api/whatsapp/webhook {
        proxy_pass         http://comms-server:4100/v1/whatsapp/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # API proxy -> backend container
    # proxy_read_timeout is raised to 300 s to cover worst-case GPU inference
    # on the IndicTrans2 translation service (single T4 worker, ~90 s/request).
    location /api/ {
        proxy_pass             http://backend:3241/api/;
        proxy_http_version     1.1;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     300s;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
    }

    # Unversioned legacy scripts (app.js, comms.js): always revalidate with the
    # server (ETag) so a fresh deploy is picked up immediately instead of being
    # served stale from the browser cache.
    location /legacy/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
